repos:
  - repo: https://github.com/ministryofjustice/devsecops-hooks
    rev: v1.4.1
    hooks:
      - id: baseline
  - repo: local
    hooks:
      - id: black-legacy-docker
        name: black (18.9b0 on Python 3.7)
        language: system
        # We use 'verbose: true' so you can see the pip install progress
        verbose: true
        # The entry follows the 'Shell Method' to avoid the Entrypoint error
        entry: >
          bash -c '
          docker run --rm
          -v "$PWD:/data"
          -w /data
          python:3.7-slim
          /bin/bash -c "pip install --quiet black==18.9b0 && black \"\$@\""
          -- "$@"' --
        types: [python]
        pass_filenames: true
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v2.1.0
    hooks:
      - id: flake8
        args: ["--config=setup.cfg", "--exclude=./cla_frontend/settings/*"]
  - repo: https://github.com/jazzband/pip-tools
    rev: 5.5.0
    hooks:
      - id: pip-compile
        language_version: python2.7
        name: pip-compile requirements-docs.in
        files: requirements-(base|docs).in
        args:
          [
            requirements/source/requirements-docs.in,
            "--output-file",
            requirements/generated/requirements-docs.txt,
          ]
      - id: pip-compile
        language_version: python2.7
        name: pip-compile requirements-dev.in
        files: requirements-(base|dev).in
        args:
          [
            requirements/source/requirements-dev.in,
            "--output-file",
            requirements/generated/requirements-dev.txt,
          ]
      - id: pip-compile
        language_version: python2.7
        name: pip-compile requirements-lint.in
        files: requirements-(base|lint).in
        args:
          [
            requirements/source/requirements-lint.in,
            "--output-file",
            requirements/generated/requirements-lint.txt,
          ]
      - id: pip-compile
        language_version: python2.7
        name: pip-compile requirements-testing.in
        files: requirements-(base|testing).in
        args:
          [
            requirements/source/requirements-testing.in,
            "--output-file",
            requirements/generated/requirements-testing.txt,
          ]
      - id: pip-compile
        language_version: python2.7
        name: pip-compile requirements-production.in
        files: requirements-(base|production).in
        args:
          [
            requirements/source/requirements-production.in,
            "--output-file",
            requirements/generated/requirements-production.txt,
          ]
