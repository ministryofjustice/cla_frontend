name: Run unit tests

runs:
  using: composite
  steps:
    - name: SLSA
      uses: ministryofjustice/devsecops-actions/sca/slsa@e3c63a5986ea6e7d57d38b7f72e5b8cf08dc7020
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 #v5.0.4
      with:
        path: .pip-cache
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements/generated/requirements-testing.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Install dependencies
      run: |
        mkdir -p .pip-cache
        pip install --cache-dir=.pip-cache --requirement requirements/generated/requirements-testing.txt --safe-chain-logging=verbose
      shell: bash
      env:
        PIP_CACHE_DIR: "${{ github.workspace }}/.pip-cache"
    - name: Run unit tests
      run: python manage.py test --verbosity=2
      shell: bash
      env:
        DJANGO_SETTINGS_MODULE: cla_frontend.settings.testing
        SECRET_KEY: testing_key
