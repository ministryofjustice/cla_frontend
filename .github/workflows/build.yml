name: Build and Push image

on:
  workflow_call:
    inputs:
      ECR_REGION:
        required: true
        type: string

      ECR_REPOSITORY:
        required: true
        type: string

      ECR_REPOSITORY_SOCKET_SERVER:
        required: true
        type: string
        description: ECR repository (socket server)

    secrets:
      ECR_ROLE_TO_ASSUME:
        required: true

      ECR_REGISTRY_URL:
        required: true

      ECR_ROLE_TO_ASSUME_SOCKET_SERVER:
        required: true

    outputs:
      image_uri:
        description: The docker image URI
        value: ${{ jobs.build-and-push.outputs.image_uri }}

      image_tag:
        description: The docker image tag
        value: ${{ jobs.build-and-push.outputs.image_tag }}

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.meta.outputs.tags }}
      image_tag: ${{ steps.extract-tag.outputs.tag }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Assume role in Cloud Platform
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ inputs.ECR_REGION }}

      - name: Login to container repository
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@261fc3d4806db1fa66a15cc11113c456db8870a7 # v2.1.0
        with:
          mask-password: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver: docker-container
          use: true

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ inputs.ECR_REPOSITORY }}
          tags: |
            type=raw,value=${{ github.ref_name == 'main' && format('main-{0}', github.sha) || format('branch-{0}', github.sha) }}

      - name: Extract image tag
        id: extract-tag
        run: |
          TAG=$(echo "${{ steps.meta.outputs.tags }}" | sed 's/.*://')
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Debug image URL
        run: |
          echo "Built image: ${{ steps.meta.outputs.tags }}"
          echo "Extracted tag: ${{ steps.extract-tag.outputs.tag }}"

      - name: Build and push main image
        id: docker-build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=main
          cache-to: type=gha,mode=max,scope=main

      - name: Assume role for socket server ECR
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME_SOCKET_SERVER }}
          aws-region: ${{ inputs.ECR_REGION }}

      - name: Login to socket server container repository
        uses: aws-actions/amazon-ecr-login@261fc3d4806db1fa66a15cc11113c456db8870a7 # v2.1.0
        with:
          mask-password: true

      - name: Build and push socket server image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: cla_socketserver/Dockerfile
          push: true
          tags: ${{ secrets.ECR_REGISTRY_URL }}/${{ inputs.ECR_REPOSITORY_SOCKET_SERVER }}:${{ steps.extract-tag.outputs.tag }}
          cache-from: type=gha,scope=socket-server
          cache-to: type=gha,mode=max,scope=socket-server