name: workflow.yml
on:
  pull_request:
  push:
    branches:
      - main


permissions:
  contents: read

jobs:
  unit-tests:
    name: "Unit tests"
    runs-on: "ubuntu-latest"
    container: python:2.7
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - uses: ./.github/actions/unit-tests

  build-and-push:
    permissions:
      contents: read
      id-token: write
    name: Build and push
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - uses: ./.github/actions/build-and-push
        with:
          ECR_REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
          ECR_ROLE_TO_ASSUME: ${{ secrets.CLA_FRONTEND_ECR_ROLE_TO_ASSUME }}
          ECR_ROLE_TO_ASSUME_SOCKET_SERVER: ${{ secrets.SOCKET_SERVER_ECR_ROLE_TO_ASSUME }}
          ECR_REPOSITORY: ${{ vars.CLA_FRONTEND_ECR_REPOSITORY }}
          ECR_REPOSITORY_SOCKET_SERVER: ${{ vars.SOCKET_SERVER_ECR_REPOSITORY }}
          ECR_REGION: ${{ vars.CLA_FRONTEND_ECR_REGION }}

  uat-deploy:
    name: UAT deploy
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'snyk-fix')
    environment: uat
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - uses: ./.github/actions/deploy
        with:
          namespace: uat
          dynamic_hostname: 'true'
          KUBE_CERT: ${{ secrets.KUBE_CERT }}
          KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
          KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
          ECR_REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          ECR_REPOSITORY_SOCKET_SERVER: ${{ vars.SOCKET_SERVER_ECR_REPOSITORY }}
          HOST: ${{ vars.UAT_HOST }}

  static-uat-deploy:
    name: Static UAT deploy
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'snyk-fix')
    environment: uat-static
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - uses: ./.github/actions/deploy
        with:
          namespace: uat
          dynamic_hostname: 'false'
          KUBE_CERT: ${{ secrets.KUBE_CERT }}
          KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
          KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
          ECR_REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          ECR_REPOSITORY_SOCKET_SERVER: ${{ vars.SOCKET_SERVER_ECR_REPOSITORY }}
          HOST: ${{ vars.UAT_HOST }}

  staging-deploy:
    name: Staging deploy
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref_name == 'main'
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - uses: ./.github/actions/deploy
        with:
          namespace: staging
          KUBE_CERT: ${{ secrets.KUBE_CERT }}
          KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
          KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
          ECR_REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          ECR_REPOSITORY_SOCKET_SERVER: ${{ vars.SOCKET_SERVER_ECR_REPOSITORY }}
          HOST: ${{ vars.STAGING_HOST }}

  training-deploy:
    name: Training deploy
    runs-on: ubuntu-latest
    needs: [staging-deploy]
    if: github.ref_name == 'main'
    environment: training
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - uses: ./.github/actions/deploy
        with:
          namespace: training
          KUBE_CERT: ${{ secrets.KUBE_CERT }}
          KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
          KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
          ECR_REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          ECR_REPOSITORY_SOCKET_SERVER: ${{ vars.SOCKET_SERVER_ECR_REPOSITORY }}
          HOST: ${{ vars.TRAINING_HOST }}

  production-deploy:
    name: Production deploy
    runs-on: ubuntu-latest
    needs: [training-deploy]
    if: github.ref_name == 'main'
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - uses: ./.github/actions/deploy
        with:
          namespace: production
          KUBE_CERT: ${{ secrets.KUBE_CERT }}
          KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
          KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
          ECR_REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          ECR_REPOSITORY_SOCKET_SERVER: ${{ vars.SOCKET_SERVER_ECR_REPOSITORY }}
          HOST: ${{ vars.PRODUCTION_HOST }}
