# Default values for cla-frontend in a uat environment.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

environment: "uat"
host: "laa-cla-frontend-uat.beta.cloud-platform.service.justice.gov.uk"
secretName: ~

ingress:
  className: beta
  modsecurity:
    enabled: false

envVars:
  BACKEND_BASE_URI:
    # Using service name instead of external domain name
    value: "http://cla-backend-app.laa-cla-backend-uat.svc.cluster.local"
