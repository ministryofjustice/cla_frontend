# Default values for cla-frontend in a uat environment.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

environment: "uat"
secretName: ~

envVars:
  BACKEND_BASE_URI:
    # Using service name instead of external domain name
    value: "http://lga-3903-sso-silas-app.laa-cla-backend-uat.svc.cluster.local"
  ENTRA_CLIENT_ID:
    secret:
      name: sso
      key: client_id
  ENTRA_TENANT_ID:
    secret:
      name: sso
      key: tenant_id
  ENTRA_CLIENT_SECRET:
    secret:
      name: sso
      key: client_secret
  ENTRA_AUTHORITY:
    secret:
      name: sso
      key: authority
  ENTRA_SCOPE:
    secret:
      name: sso
      key: backend_scope
  ENTRA_TOKEN_EXPECTED_AUDIENCE:
    secret:
      name: sso
      key: expected_audience
